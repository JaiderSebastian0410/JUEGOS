<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="ship" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="50%" stop-color="#0088aa"/>
      <stop offset="100%" stop-color="#005566"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="10" cy="12" r="0.8" fill="#fff" opacity="0.6"/>
  <circle cx="50" cy="8" r="0.6" fill="#fff" opacity="0.4"/>
  <circle cx="55" cy="45" r="0.7" fill="#fff" opacity="0.5"/>
  <circle cx="8" cy="50" r="0.5" fill="#fff" opacity="0.3"/>
  <circle cx="28" cy="5" r="0.6" fill="#fff" opacity="0.5"/>
  <!-- Ship body -->
  <g filter="url(#glow)">
    <polygon points="32,10 44,48 38,44 32,52 26,44 20,48" fill="url(#ship)" stroke="#00ffff" stroke-width="1" stroke-linejoin="round"/>
    <!-- Engine glow -->
    <ellipse cx="32" cy="50" rx="5" ry="8" fill="#00ffff" opacity="0.3"/>
    <ellipse cx="32" cy="48" rx="3" ry="5" fill="#00eeff" opacity="0.5"/>
    <!-- Wing details -->
    <line x1="26" y1="30" x2="20" y2="42" stroke="#00ddff" stroke-width="0.8" opacity="0.7"/>
    <line x1="38" y1="30" x2="44" y2="42" stroke="#00ddff" stroke-width="0.8" opacity="0.7"/>
    <!-- Cockpit -->
    <ellipse cx="32" cy="24" rx="4" ry="6" fill="#0a0a2e" stroke="#00ffff" stroke-width="0.8"/>
    <ellipse cx="32" cy="23" rx="2.5" ry="4" fill="#003344" opacity="0.8"/>
  </g>
</svg>
